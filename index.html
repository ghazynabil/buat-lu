<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Animasi Spesial</title>
    <style>
        /* Mengatur font dan background warna gradien */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Mencegah layar bisa di-scroll saat ada animasi terbang */
        }

        /* Styling dan animasi untuk kotak surat utama */
        .envelope {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 135, 0.3);
            text-align: center;
            max-width: 400px;
            width: 85%;
            position: relative;
            z-index: 10;
            
            /* Animasi dimulai dari transparan dan posisi agak di bawah */
            opacity: 0;
            transform: translateY(50px);
            animation: slideUpFade 1.2s ease-out forwards;
            animation-delay: 0.3s;
        }

        /* Keyframes untuk kotak surat meluncur ke atas */
        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Styling dan animasi untuk judul */
        h1 {
            color: #ff4d6d;
            font-size: 28px;
            margin-bottom: 10px;
            animation: pulseText 2s infinite alternate;
        }

        @keyframes pulseText {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }

        /* Styling dan animasi efek teks muncul pelan-pelan */
        p {
            color: #555555;
            line-height: 1.6;
            font-size: 16px;
            opacity: 0;
            animation: fadeInText 1s ease-in forwards;
            animation-delay: 1.5s; /* Teks muncul setelah kotak surat selesai meluncur */
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        /* Animasi detak jantung buat ikon paling bawah */
        .heart {
            font-size: 50px;
            margin-top: 25px;
            display: inline-block;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* --- Animasi Background Hati Melayang --- */
        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Supaya background tidak menutupi klik pada surat */
        }

        .floating-hearts span {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            animation: floatUp linear infinite;
        }

        /* Posisi dan kecepatan beda-beda tiap emoji */
        .floating-hearts span:nth-child(1) { left: 10%; animation-duration: 5s; animation-delay: 0s; }
        .floating-hearts span:nth-child(2) { left: 30%; animation-duration: 7s; animation-delay: 2s; }
        .floating-hearts span:nth-child(3) { left: 50%; animation-duration: 6s; animation-delay: 1s; }
        .floating-hearts span:nth-child(4) { left: 70%; animation-duration: 8s; animation-delay: 3s; }
        .floating-hearts span:nth-child(5) { left: 90%; animation-duration: 5.5s; animation-delay: 1.5s; }

        @keyframes floatUp {
            to {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="floating-hearts">
        <span>💖</span>
        <span>✨</span>
        <span>💕</span>
        <span>💖</span>
        <span>✨</span>
    </div>

    <div class="envelope">
        <h1>Hai, Kamu!</h1>
        <p>Surat ini dibikin khusus pakai sedikit keajaiban animasi lho. 🪄</p>
        <p>Cuma mau bilang makasih ya sudah jadi alasan senyumanku hari ini. Semoga harimu menyenangkan dan jauh lebih indah dari hari kemarin!</p>
        <div class="heart">💌</div>
    </div>

</body>
</html>
