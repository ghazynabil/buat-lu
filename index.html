<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Letter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <div id="welcome-screen">
        <div class="flower-petal pink">🌸</div>
        <div class="flower-petal blue">🦋</div>
        <div class="flower-petal yellow">✨</div>
        <div class="flower-petal pink" style="left:20%; animation-delay:2s;">🌸</div>
        <div class="flower-petal blue" style="left:70%; animation-delay:1.5s;">🦋</div>
        <div class="flower-petal yellow" style="left:85%; animation-delay:3s;">✨</div>

        <div class="welcome-content">
            <h1 class="handwriting">Halo, Tuan Putri...</h1>
            <p>Ada sebuah surat misterius yang jatuh di hutan ajaib.</p>
            <p class="question">Apakah kamu ingin melihat isi suratnya?</p>
            
            <div class="button-group">
                <button class="btn-choice btn-yes" onclick="startExperience()">Mau Mau! ✨</button>
                <button class="btn-choice btn-no" onclick="refuseLetter()">Enggak Dulu 🤭</button>
            </div>
        </div>
    </div>

    <div id="main-scene" class="hidden">
        <div class="forest-bg"></div>
        <div class="carriage"></div>
        <div class="flying-letter" id="flyingLetter" onclick="openLetter()">✉️</div>
    </div>

    <div id="letter-modal" class="hidden">
        <div class="letter-container">
            <div class="letter-front" id="letterFront">
                <h2 class="handwriting">Untukmu...</h2>
                <p>Semoga harimu seindah warna pastel di awal tadi. Ingatlah bahwa kamu berharga dan selalu bersinar.</p>
                <button class="btn-reply" onclick="flipToReply()">Balas Surat</button>
            </div>

            <div class="letter-back hidden" id="letterBack">
                <h2 class="handwriting">Tulis Balasanmu:</h2>
                <textarea placeholder="Ketik jawabanmu di sini ya..."></textarea>
                <button class="btn-send" onclick="sendReply()">Terbangkan Balasan 🕊️</button>
            </div>
        </div>
    </div>

    <script>
        function startExperience() {
            // Putar lagu Daniel Caesar - Always
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Audio play diblokir browser."));

            // Transisi keluar welcome screen
            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            
            setTimeout(() => {
                welcome.style.display = 'none';
                document.getElementById('main-scene').classList.remove('hidden');
                
                // Surat terbang muncul setelah kereta lewat (4 detik)
                setTimeout(() => {
                    const letter = document.getElementById('flyingLetter');
                    letter.style.opacity = '1';
                    letter.style.animation = 'flyDown 4s ease-in-out forwards';
                }, 4000);
            }, 1000);
        }

        function refuseLetter() {
            alert("Yah... keretanya putar balik deh 🤭 Buka lagi kalau sudah siap ya!");
        }

        function openLetter() {
            const modal = document.getElementById('letter-modal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.style.opacity = '1', 10);
        }

        function flipToReply() {
            document.getElementById('letterFront').classList.add('hidden');
            document.getElementById('letterBack').classList.remove('hidden');
        }

        function sendReply() {
            alert('Balasanmu sudah berubah jadi burung kertas dan terbang ke langit! ✨');
        }
    </script>
</body>
</html>
