<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Spesial Buat Kamu</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .envelope {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            border: 2px dashed #ff9999;
        }
        h1 {
            color: #ff4d4d;
            font-size: 24px;
        }
        p {
            color: #333333;
            line-height: 1.6;
            font-size: 16px;
        }
        .heart {
            color: #ff4d4d;
            font-size: 40px;
            margin-top: 15px;
            animation: beat 1s infinite alternate;
        }
        @keyframes beat {
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="envelope">
        <h1>Hai Kamu! ❤️</h1>
        <p>Ini adalah surat virtual yang kubuat khusus lewat GitHub. Cuma mau bilang terima kasih ya sudah selalu ada dan jadi orang yang luar biasa!</p>
        <p>Semoga harimu selalu menyenangkan dan penuh senyuman. ✨</p>
        <div class="heart">💌</div>
    </div>

</body>
</html>
