<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for You</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <div id="welcome-screen">
        <div class="welcome-content">
            <h1>Untukmu...</h1>
            <p>Sentuh layar untuk membuka</p>
            <button onclick="startExperience()">Buka</button>
        </div>
    </div>

    <div id="main-scene" class="hidden">
        <div class="forest-bg"></div>
        
        <div class="carriage"></div>

        <div class="flying-letter" id="flyingLetter" onclick="openLetter()">
            ✉️
        </div>
    </div>

    <div id="letter-modal" class="hidden">
        <div class="letter-container" id="letterContainer">
            
            <div class="letter-front" id="letterFront">
                <h2 class="handwriting">Hai, Tuan Putri...</h2>
                <p>Semoga harimu seindah hutan ajaib ini. Ingatlah bahwa kamu selalu bersinar seperti emas di kereta kudamu.</p>
                <p>Jaga dirimu baik-baik, ya.</p>
                <button class="btn-reply" onclick="flipToReply()">Balas Surat</button>
            </div>

            <div class="letter-back hidden" id="letterBack">
                <h2 class="handwriting">Balasanmu:</h2>
                <textarea placeholder="Tulis sesuatu di sini..."></textarea>
                <button class="btn-send" onclick="sendReply()">Terbangkan Balasan ✨</button>
            </div>

        </div>
    </div>

    <script>
        function startExperience() {
            // Memulai musik
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Audio diblokir browser, butuh interaksi user pertama kali."));
            
            // Menghilangkan Welcome Screen dengan transisi halus
            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                document.getElementById('main-scene').classList.remove('hidden');
                
                // Surat muncul dan terbang jatuh setelah 4 detik (menunggu kereta lewat)
                setTimeout(() => {
                    const letter = document.getElementById('flyingLetter');
                    letter.style.opacity = '1';
                    letter.style.animation = 'flyDown 4s ease-in-out forwards';
                }, 4000);
            }, 1000);
        }

        function openLetter() {
            const modal = document.getElementById('letter-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.style.opacity = '1';
            }, 10);
        }

        function flipToReply() {
            document.getElementById('letterFront').classList.add('hidden');
            document.getElementById('letterBack').classList.remove('hidden');
        }

        function sendReply() {
            alert('Balasanmu telah dilipat menjadi burung kertas dan diterbangkan ke langit! ✨');
            // Catatan: Di sini bisa diintegrasikan dengan backend email seperti Formspree jika ingin menerima input teks asli.
        }
    </script>
</body>
</html>
